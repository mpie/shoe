<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#A294F9">
    <title>Sneaker Monitor</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="card hero">
        <p class="eyebrow">Scrapling monitor</p>
        <h1>Sneaker auto-checker</h1>
        <p>Meerdere shops tegelijk bewaken. Elke shop gebruikt zijn eigen login.</p>
        <div class="actions">
          <button id="notifyButton" class="ghost" type="button">Notificaties</button>
        </div>
      </section>

      <div id="monitors"></div>
    </main>

    <template id="monitorTemplate">
      <section class="card monitor" data-id="">
        <div class="log-header">
          <h2 class="monitor-title"></h2>
          <span class="login-badge"></span>
        </div>

        <form class="controls monitor-form">
          <label>
            Zoektekst
            <input class="f-searchText" autocomplete="off">
          </label>

          <label>
            URL
            <input class="f-targetUrl" autocomplete="off">
          </label>

          <div class="grid">
            <label>
              Interval
              <input class="f-intervalSeconds" type="number" min="5" value="20">
            </label>

            <label>
              Maat
              <input class="f-size" autocomplete="off">
            </label>
          </div>

          <div class="actions">
            <button class="startButton" type="submit">Start</button>
            <button class="stopButton secondary" type="button">Stop</button>
            <button class="clearButton ghost" type="button">Log wissen</button>
          </div>
        </form>

        <div class="status-grid">
          <div class="status-row">
            <span>Status</span>
            <strong class="stateLabel">Niet actief</strong>
          </div>
          <div class="status-row">
            <span>Checks</span>
            <strong class="checksLabel">0</strong>
          </div>
        </div>
        <p class="message">Klaar om te starten.</p>

        <ol class="log-list">
          <li>Nog geen activiteit.</li>
        </ol>
      </section>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
